<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 1024px;
            margin: auto;
        }
        .offline-banner {
            position: fixed;
            bottom: 8px;
            right: 8px;
            padding: 4px 10px;
            background: #d32f2f;
            color: #fff;
            border-radius: 4px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0.92;
            pointer-events: none;
            display: none;
        }
        .offline-banner.offline {
            display: block;
        }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
