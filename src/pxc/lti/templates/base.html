<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PXC LTI{% endblock %}</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 1024px;
            margin: auto;
            padding: 1em;
        }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        form label { display: block; margin: 0.5em 0 0.2em; font-weight: bold; }
        form input[type="text"], form input[type="url"] { width: 100%; padding: 6px; box-sizing: border-box; }
        .btn { display: inline-block; padding: 6px 16px; background: #1976d2; color: #fff; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #1565c0; }
        .btn-danger { background: #d32f2f; }
        .btn-danger:hover { background: #b71c1c; }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
