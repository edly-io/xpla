<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            p {
                color: red;
            }
        </style>
    </head>
    <script type="module" src="/learningactivity.js"></script>
    <body>
        <p>Not in the shadow DOM</p>
        <learning-activity src="/quiz.js">
            <activity-title>My Learning Activity</activity-title>
            <activity-content>
                <p>This content is slotted into the component.</p>
                <form>
                    <input type="radio" name="answer" value="right" /><label
                        for="right"
                        >Right answer</label
                    >
                    <input type="radio" name="answer" value="wrong" /><label
                        for="wrong"
                        >Wrong answer</label
                    >
                    <button type="submit">Check</button>
                </form>
            </activity-content>
        </learning-activity>
    </body>
</html>
