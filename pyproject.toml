[project]
name = "gulps-demo"
version = "0.1.0"
dependencies = [
    "extism",
    "fastapi[standard]",
    "jinja2",
    "jsonschema",
    "uvicorn[standard]",
]

[project.optional-dependencies]
dev = [
    "black",
    "httpx",
    "mypy",
    "pylint",
    "pytest",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pylint.'MESSAGES CONTROL']
disable=[
    "duplicate-code",
    "fixme",
    "invalid-name",
    "line-too-long",
    "missing-docstring",
    "too-few-public-methods",
    "too-many-instance-attributes",
]

[tool.mypy]
plugins = ['pydantic.mypy']
warn_unused_configs = true
ignore_missing_imports = true
strict = true
