[project]
name = "learning-activity"
version = "0.1.0"
dependencies = [
    "fastapi[standard]",
    "jinja2",
    "uvicorn[standard]",
    "extism",
]

[project.optional-dependencies]
dev = [
    "black",
    "httpx",
    "mypy",
    "pylint",
    "pytest",
]

[tool.setuptools.packages.find]
where = ["src"]
