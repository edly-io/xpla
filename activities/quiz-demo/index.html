<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Demo</title>
</head>
<body>
    <script type="module" src="/lib/learningactivity.js"></script>

    <learning-activity src="/activity.js">
        <activity-title>Demo Quiz</activity-title>
        <activity-content>
            <p>What is 2 + 2?</p>
            <form>
                <label><input type="radio" name="answer" value="3"> 3</label><br>
                <label><input type="radio" name="answer" value="4"> 4</label><br>
                <label><input type="radio" name="answer" value="5"> 5</label><br>
                <button type="submit">Check Answer</button>
            </form>
        </activity-content>
    </learning-activity>
</body>
</html>
